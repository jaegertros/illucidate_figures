<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Era 3 Icon: DNA Double Helix — 16S rRNA Revolution -->
  <title>DNA Double Helix</title>
  <defs>
    <style>
      .strand1  { fill: none; stroke: #2D8C5A; stroke-width: 3; stroke-linecap: round; }
      .strand2  { fill: none; stroke: #2D8C5A; stroke-width: 3; stroke-linecap: round; opacity: 0.55; }
      .rung     { stroke: #2D8C5A; stroke-width: 2.5; stroke-linecap: round; opacity: 0.4; }
      .base     { fill: #2D8C5A; }
    </style>
  </defs>

  <!--
    DNA helix: two sinusoidal paths offset by half wavelength.
    Horizontal rungs connect the two strands at each crossing.
    The helix runs top-to-bottom (vertical orientation).
    x = cx + A*sin(2π·t/λ),  y = y_top + t
    Strand 1: phase=0,     cx=50, A=18
    Strand 2: phase=π,     cx=50, A=18
    λ ≈ 30px, so one full turn every 30 pixels vertically.
  -->

  <!-- Strand 1 (front, solid) -->
  <path class="strand1"
        d="M 32,8
           C 38,10 68,18 68,23
           C 68,28 38,36 32,41
           C 26,46 68,54 68,59
           C 68,64 32,72 32,77
           C 32,82 68,90 68,95"/>

  <!-- Strand 2 (back, faded) -->
  <path class="strand2"
        d="M 68,8
           C 62,10 32,18 32,23
           C 32,28 62,36 68,41
           C 74,46 32,54 32,59
           C 32,64 68,72 68,77
           C 68,82 32,90 32,95"/>

  <!-- Rungs (hydrogen bonds between base pairs) -->
  <line class="rung" x1="32" y1="23" x2="68" y2="23"/>
  <line class="rung" x1="50" y1="32" x2="50" y2="32" stroke-width="0"/>
  <line class="rung" x1="68" y1="41" x2="32" y2="41"/>
  <line class="rung" x1="32" y1="59" x2="68" y2="59"/>
  <line class="rung" x1="68" y1="77" x2="32" y2="77"/>
  <!-- Extra rungs at midpoints -->
  <line class="rung" x1="38" y1="14" x2="62" y2="14"/>
  <line class="rung" x1="62" y1="32" x2="38" y2="32"/>
  <line class="rung" x1="38" y1="50" x2="62" y2="50"/>
  <line class="rung" x1="62" y1="68" x2="38" y2="68"/>
  <line class="rung" x1="38" y1="86" x2="62" y2="86"/>

  <!-- Base-pair dots at strand intersections -->
  <circle class="base" cx="32" cy="23" r="3"/>
  <circle class="base" cx="68" cy="23" r="3"/>
  <circle class="base" cx="68" cy="41" r="3"/>
  <circle class="base" cx="32" cy="41" r="3"/>
  <circle class="base" cx="32" cy="59" r="3"/>
  <circle class="base" cx="68" cy="59" r="3"/>
  <circle class="base" cx="68" cy="77" r="3"/>
  <circle class="base" cx="32" cy="77" r="3"/>
</svg>
