<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Era 1 Icon: Microscope — Observation & Morphology -->
  <title>Microscope</title>
  <defs>
    <style>
      .stroke { fill: none; stroke: #5B4A8A; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .fill   { fill: #5B4A8A; stroke: none; }
    </style>
  </defs>
  <!-- Base -->
  <rect x="24" y="86" width="52" height="6" rx="3" class="stroke"/>
  <!-- Arm / pillar -->
  <rect x="44" y="30" width="8" height="58" rx="4" class="stroke"/>
  <!-- Nosepiece -->
  <rect x="37" y="27" width="22" height="8" rx="4" class="stroke"/>
  <!-- Objective lens -->
  <rect x="43" y="14" width="10" height="16" rx="3" class="stroke"/>
  <!-- Stage platform -->
  <rect x="32" y="52" width="32" height="5" rx="2" class="stroke"/>
  <!-- Eyepiece arm (angled) -->
  <line x1="44" y1="30" x2="30" y2="12" class="stroke"/>
  <!-- Eyepiece tube -->
  <rect x="22" y="7" width="12" height="8" rx="3" class="stroke"/>
  <!-- Light aperture -->
  <ellipse cx="48" cy="57" rx="5" ry="3" class="stroke"/>
  <!-- Specimen dot -->
  <circle cx="48" cy="55" r="2" class="fill" opacity="0.7"/>
  <!-- Focusing knob -->
  <rect x="53" y="43" width="10" height="7" rx="3" class="stroke"/>
</svg>
