<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Era 5 Icon: Neural Network — High-Dimensional AI -->
  <title>Neural Network / AI</title>
  <defs>
    <style>
      .edge   { stroke: #2155A0; stroke-width: 1.5; opacity: 0.3; }
      .node   { stroke: #2155A0; stroke-width: 2.5; }
      .active { fill: #2155A0; stroke: none; }
      .hollow { fill: white; }
    </style>
  </defs>

  <!--
    Three-layer neural network:
      Input  layer (3 nodes): x = 18
      Hidden layer (4 nodes): x = 50
      Output layer (2 nodes): x = 82
  -->

  <!-- Input layer nodes Y positions -->
  <!-- i1=22, i2=50, i3=78 -->

  <!-- Hidden layer nodes Y positions -->
  <!-- h1=16, h2=37, h3=63, h4=84 -->

  <!-- Output layer nodes Y positions -->
  <!-- o1=36, o2=64 -->

  <!-- ── Edges input → hidden ────────────────────────────────────────── -->
  <line class="edge" x1="18" y1="22" x2="50" y2="16"/>
  <line class="edge" x1="18" y1="22" x2="50" y2="37"/>
  <line class="edge" x1="18" y1="22" x2="50" y2="63"/>
  <line class="edge" x1="18" y1="22" x2="50" y2="84"/>

  <line class="edge" x1="18" y1="50" x2="50" y2="16"/>
  <line class="edge" x1="18" y1="50" x2="50" y2="37"/>
  <line class="edge" x1="18" y1="50" x2="50" y2="63"/>
  <line class="edge" x1="18" y1="50" x2="50" y2="84"/>

  <line class="edge" x1="18" y1="78" x2="50" y2="16"/>
  <line class="edge" x1="18" y1="78" x2="50" y2="37"/>
  <line class="edge" x1="18" y1="78" x2="50" y2="63"/>
  <line class="edge" x1="18" y1="78" x2="50" y2="84"/>

  <!-- ── Edges hidden → output ──────────────────────────────────────── -->
  <line class="edge" x1="50" y1="16" x2="82" y2="36"/>
  <line class="edge" x1="50" y1="16" x2="82" y2="64"/>
  <line class="edge" x1="50" y1="37" x2="82" y2="36"/>
  <line class="edge" x1="50" y1="37" x2="82" y2="64"/>
  <line class="edge" x1="50" y1="63" x2="82" y2="36"/>
  <line class="edge" x1="50" y1="63" x2="82" y2="64"/>
  <line class="edge" x1="50" y1="84" x2="82" y2="36"/>
  <line class="edge" x1="50" y1="84" x2="82" y2="64"/>

  <!-- ── Input nodes ──────────────────────────────────────────────────── -->
  <circle class="node hollow" cx="18" cy="22" r="8"/>
  <circle class="node hollow" cx="18" cy="50" r="8"/>
  <circle class="node hollow" cx="18" cy="78" r="8"/>
  <circle class="active"      cx="18" cy="22" r="4"/>
  <circle class="active"      cx="18" cy="50" r="4"/>
  <circle class="active"      cx="18" cy="78" r="4"/>

  <!-- ── Hidden nodes ─────────────────────────────────────────────────── -->
  <circle class="node hollow" cx="50" cy="16" r="8"/>
  <circle class="node hollow" cx="50" cy="37" r="8"/>
  <circle class="node hollow" cx="50" cy="63" r="8"/>
  <circle class="node hollow" cx="50" cy="84" r="8"/>
  <circle class="active"      cx="50" cy="16" r="4" opacity="0.7"/>
  <circle class="active"      cx="50" cy="37" r="4" opacity="0.9"/>
  <circle class="active"      cx="50" cy="63" r="4" opacity="0.6"/>
  <circle class="active"      cx="50" cy="84" r="4" opacity="0.5"/>

  <!-- ── Output nodes ─────────────────────────────────────────────────── -->
  <circle class="node hollow" cx="82" cy="36" r="8"/>
  <circle class="node hollow" cx="82" cy="64" r="8"/>
  <circle class="active"      cx="82" cy="36" r="5.5" opacity="1"/>
  <circle class="active"      cx="82" cy="64" r="3"   opacity="0.6"/>

  <!-- Layer labels -->
  <text x="18" y="96" text-anchor="middle" font-size="7" fill="#2155A0" font-family="sans-serif" opacity="0.7">Input</text>
  <text x="50" y="96" text-anchor="middle" font-size="7" fill="#2155A0" font-family="sans-serif" opacity="0.7">Hidden</text>
  <text x="82" y="96" text-anchor="middle" font-size="7" fill="#2155A0" font-family="sans-serif" opacity="0.7">Output</text>
</svg>
