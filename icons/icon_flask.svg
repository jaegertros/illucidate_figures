<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Era 2 Icon: Erlenmeyer Flask — Biochemical Profiling -->
  <title>Flask</title>
  <defs>
    <style>
      .stroke { fill: none; stroke: #1B7B8A; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .liquid { fill: #1B7B8A; opacity: 0.25; }
      .bubble { fill: #1B7B8A; opacity: 0.5; }
    </style>
  </defs>
  <!-- Flask neck -->
  <rect x="40" y="10" width="20" height="25" rx="4" class="stroke"/>
  <!-- Flask body outline (trapezoid → use path) -->
  <path d="M 40 35 L 15 82 Q 15 88 22 88 L 78 88 Q 85 88 85 82 L 60 35 Z"
        class="stroke"/>
  <!-- Liquid fill (lower portion) -->
  <path d="M 22 65 Q 22 60 30 58 L 70 58 Q 78 60 78 65 L 78 82 Q 78 88 72 88 L 28 88 Q 22 88 22 82 Z"
        class="liquid"/>
  <!-- Liquid surface wave -->
  <path d="M 28 60 Q 40 54 50 58 Q 60 62 72 58"
        fill="none" stroke="#1B7B8A" stroke-width="1.5" opacity="0.6"/>
  <!-- Bubbles in liquid -->
  <circle cx="36" cy="73" r="3" class="bubble"/>
  <circle cx="52" cy="68" r="4" class="bubble"/>
  <circle cx="64" cy="76" r="2.5" class="bubble"/>
  <!-- Neck ring / stopper line -->
  <line x1="38" y1="20" x2="62" y2="20" stroke="#1B7B8A" stroke-width="2" opacity="0.5"/>
</svg>
